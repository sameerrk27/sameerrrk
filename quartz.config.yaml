# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Sameer's Data Garden 🌱
  pageTitleSuffix: " | Sameer Khan"
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: plausible
  locale: en-US
  baseUrl: sameerrk27.github.io/sameerrrk
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Inter
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#f8faff"
        lightgray: "#e8edf5"
        gray: "#9aacbf"
        darkgray: "#3d4f61"
        dark: "#1a2a3a"
        secondary: "#0ea5e9"
        tertiary: "#6366f1"
        highlight: rgba(14, 165, 233, 0.1)
        textHighlight: "#bfdbfe"
      darkMode:
        light: "#0d1117"
        lightgray: "#1c2333"
        gray: "#4a5568"
        darkgray: "#c9d3de"
        dark: "#e6edf3"
        secondary: "#38bdf8"
        tertiary: "#818cf8"
        highlight: rgba(56, 189, 248, 0.08)
        textHighlight: "#1e3a5f"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 20
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/fonts
    enabled: true
